<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <p class="tag">Your website — a blank canvas</p>
      <h1>JJ's Dashboard</h1>

      <section class="card" aria-labelledby="calendar-heading">
        <div class="today-header">
          <p class="tag" id="calendar-heading">לוח לימוד יומי</p>
          <p class="today-date" id="today-date"></p>
        </div>

        <ul id="calendar-list" class="calendar-list"></ul>

        <p id="calendar-status" class="hint">טוען את לוח הלימוד היומי מ־Sefaria…</p>
      </section>

      <section class="card scores-card" dir="ltr" aria-labelledby="worldcup-heading">
        <div class="today-header">
          <p class="tag" id="worldcup-heading">World Cup Scores</p>
        </div>
        <ul id="worldcup-list" class="scores-list"></ul>
        <p id="worldcup-status" class="hint">Loading World Cup scores from ESPN…</p>
      </section>

      <section class="card scores-card" dir="ltr" aria-labelledby="summerleague-heading">
        <div class="today-header">
          <p class="tag" id="summerleague-heading">NBA Summer League Scores</p>
        </div>
        <ul id="summerleague-list" class="scores-list"></ul>
        <p id="summerleague-status" class="hint">Loading NBA Summer League scores from ESPN…</p>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="scores.js"></script>
  </body>
</html>
